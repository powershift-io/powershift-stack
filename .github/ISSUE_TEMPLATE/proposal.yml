name: Stack proposal
description: Propose a governance, legal, runtime, template, or example improvement.
title: "Proposal: "
labels: [enhancement]
body:
  - type: textarea
    id: tension
    attributes:
      label: Tension
      description: What gap, risk, opportunity, or need does this proposal address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change in the Stack?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Primer / Constitution / Profiles
        - Legal adoption pathway
        - Legal or constitutional proposal
        - Runtime reference pattern
        - OpenClaw overlay
        - Template
        - Example
        - Repository navigation
        - Other
    validations:
      required: true
  - type: dropdown
    id: origin
    attributes:
      label: Contribution origin
      options:
        - Human-authored
        - Mind-authored
        - Hybrid human + Mind
        - Origin uncertain / needs steward review
    validations:
      required: true
  - type: textarea
    id: provenance
    attributes:
      label: Provenance notes
      description: If Mind-authored or hybrid, name the Mind or agent identity, operator or governance source, authority basis, and any known uncertainty.
  - type: textarea
    id: boundary
    attributes:
      label: Public-safety / boundary notes
      description: Does this touch private deployment details, legal posture, constitutional doctrine, security posture, licensing, authority, or external commitments?
